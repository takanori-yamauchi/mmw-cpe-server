<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>データ表示</title>
</head>
<body>

<h1>受信データ一覧</h1>
<ul id="list"></ul>

<script>
fetch('https://mmw-cpe-server.onrender.com/api/data')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('list');

    data.forEach(item => {
      const li = document.createElement('li');
      li.textContent = JSON.stringify(item);
      list.appendChild(li);
    });
  })
  .catch(err => console.error('エラー:', err));
</script>

</body>
</html>
